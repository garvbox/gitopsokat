---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: default
spec:
  values:
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: mdi:cloud-search-outline
          traefik.ingress.kubernetes.io/router.middlewares: default-whitelist@kubernetescrd
    persistence:
      config:
        existingClaim: prowlarr-config
        type: null
        accessMode: null
        size: null
