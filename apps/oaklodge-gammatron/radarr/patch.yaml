---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: default
spec:
  values:
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: mdi:filmstrip
    persistence:
      config:
        existingClaim: radarr-config
        type: null
        accessMode: null
        size: null
      videos:
        existingClaim: videos-pvc
      downloads:
        existingClaim: downloads-pvc
