---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: default
spec:
  values:
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: mdi:television-classic
    persistence:
      config:
        existingClaim: sonarr-config
        type: null
        accessMode: null
        size: null
      videos:
        existingClaim: videos-pvc
      downloads:
        existingClaim: downloads-pvc
