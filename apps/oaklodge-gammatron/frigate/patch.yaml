---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
  namespace: default
spec:
  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.1
            resources:
              requests:
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
            securityContext:
              privileged: true
            env:
              PLUS_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: frigate-plus-api-key
                    key: api-key
    defaultPodOptions:
      securityContext:
        supplementalGroups: [44, 109]
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
        kubernetes.io/hostname: gammatron
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: mdi:cctv
          nginx.ingress.kubernetes.io/backend-protocol: null
          traefik.ingress.kubernetes.io/service.serverstransport: default-frigate-insecure@kubernetescrd
    service:
      main:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          metallb.universe.tf/loadBalancerIPs: ${metallb_ip_frigate}
          traefik.ingress.kubernetes.io/service.serversscheme: https
    persistence:
      config:
        existingClaim: frigate-config
        type: null
        accessMode: null
        size: null
      media:
        existingClaim: frigate-media
        type: null
        accessMode: null
        size: null
