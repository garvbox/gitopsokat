---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: default
spec:
  values:
    controllers:
      main:
        containers:
          main:
            resources:
              requests:
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
    defaultPodOptions:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      securityContext:
        supplementalGroups: [44, 109]
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: simple-icons:jellyfin
    persistence:
      config:
        existingClaim: jellyfin-config
        type: null
        accessMode: null
        size: null
      videos:
        existingClaim: videos-pvc
    service:
      main:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          metallb.universe.tf/loadBalancerIPs: ${metallb_ip_jellyfin}
