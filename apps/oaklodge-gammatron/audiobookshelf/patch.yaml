---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: default
spec:
  values:
    controllers:
      main:
        replicas: 0
    ingress:
      main:
        className: traefik
        annotations:
          hajimari.io/icon: mdi:bookshelf
    persistence:
      config:
        existingClaim: audiobookshelf-config
        type: null
        accessMode: null
        size: null
        retain: true
      metadata:
        existingClaim: audiobookshelf-metadata
        type: null
        accessMode: null
        size: null
        retain: true
      media:
        existingClaim: audiobookshelf-media
        type: null
        accessMode: null
        size: null
      audiobooks:
        existingClaim: audiobookshelf-audiobooks
        type: null
        accessMode: null
        size: null
