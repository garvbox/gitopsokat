---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deesl
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/garvbox/deesl
              tag: 0.8.6
            env:
              TZ: "Europe/Dublin"
              SERVER_BASE_URL: https://deesl.${cluster_ext_domain}
              SERVER_HOST: 0.0.0.0
            probes:
              liveness: &probe
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
              readiness: *probe
              startup: *probe
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    ingress:
      main:
        className: nginx
        annotations:
          hajimari.io/icon: mdi:web
        hosts:
          - host: deesl.${cluster_ext_domain}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
