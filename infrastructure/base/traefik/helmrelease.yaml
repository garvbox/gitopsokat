---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: 41.0.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: false
    remediation:
      retries: 3
  values:
    service:
      enabled: true
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        metallb.universe.tf/loadBalancerIPs: ${metallb_ip_traefik}
    ingressClass:
      enabled: true
      isDefaultClass: true
    tls:
      stores:
        default:
          defaultCertificate:
            secretName: letsencrypt-cert-secret # pragma: allowlist secret
    providers:
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
